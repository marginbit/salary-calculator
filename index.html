<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 实时工资计算器</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8165396177381960" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a0a00 0%, #2d1810 25%, #1a0a00 50%, #0d0500 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffd700;
        }

        /* 背景金色粒子效果 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffd700 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 金币掉落容器 */
        #coin-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .coin {
            position: absolute;
            font-size: 24px;
            animation: coinFall linear forwards;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffaa00;
        }

        @keyframes coinFall {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.8);
                opacity: 0.3;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ffec8b, #ffd700, #ffaa00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            text-align: center;
            color: #c9a227;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* 输入区域 */
        .input-section {
            background: linear-gradient(145deg, rgba(45, 30, 15, 0.9), rgba(30, 20, 10, 0.95));
            border: 2px solid;
            border-image: linear-gradient(45deg, #ffd700, #ffaa00, #ffd700) 1;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2), inset 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            padding: 15px;
            border: 2px solid #8b6914;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: scale(1.02);
        }

        .input-group input::placeholder {
            color: #666;
        }

        /* 按钮 */
        .btn-gold {
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a0a00;
            background: linear-gradient(45deg, #ffd700, #ffec8b, #ffd700, #ffaa00);
            background-size: 300% 300%;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: gradientShift 3s ease infinite;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .btn-gold:active {
            transform: translateY(-1px);
        }

        /* 显示区域 */
        .display-section {
            display: none;
            background: linear-gradient(145deg, rgba(45, 30, 15, 0.95), rgba(30, 20, 10, 0.98));
            border: 3px solid;
            border-image: linear-gradient(45deg, #ffd700, #ffaa00, #ffd700, #ffec8b, #ffd700) 1;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.3), inset 0 0 50px rgba(255, 215, 0, 0.08);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 15px 50px rgba(255, 215, 0, 0.3), inset 0 0 50px rgba(255, 215, 0, 0.08); }
            50% { box-shadow: 0 20px 60px rgba(255, 215, 0, 0.5), inset 0 0 60px rgba(255, 215, 0, 0.12); }
        }

        .display-section.active {
            display: block;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 金额显示 */
        .money-display {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(180deg, #ffd700 0%, #ffec8b 30%, #ffd700 50%, #ffaa00 70%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .money-label {
            color: #c9a227;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(60, 40, 20, 0.8), rgba(40, 25, 15, 0.9));
            border: 1px solid #8b6914;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #a08040;
        }

        /* 倍速控制 */
        .speed-control {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .speed-label {
            color: #ffd700;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .speed-slider {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(90deg, #3d2817, #8b6914);
            outline: none;
            -webkit-appearance: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            transition: all 0.2s ease;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 1);
        }

        .speed-display {
            margin-top: 10px;
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: bold;
        }

        .speed-hint {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .speed-hint.show {
            opacity: 1;
            animation: blink 1s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 工作状态 */
        .work-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .work-status.working {
            background: linear-gradient(90deg, rgba(0, 150, 0, 0.3), rgba(0, 200, 0, 0.2));
            border: 2px solid #00ff00;
            color: #00ff00;
            animation: workingPulse 1.5s ease infinite;
        }

        .work-status.resting {
            background: linear-gradient(90deg, rgba(150, 100, 0, 0.3), rgba(200, 150, 0, 0.2));
            border: 2px solid #ffaa00;
            color: #ffaa00;
        }

        @keyframes workingPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 0, 0.6); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .title { font-size: 1.8rem; }
            .money-display { font-size: 2.5rem; }
            .input-section, .display-section { padding: 20px; }
        }

        /* 数字滚动效果 */
        .digit-roll {
            display: inline-block;
            animation: digitPop 0.1s ease;
        }

        @keyframes digitPop {
            0% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>
    
    <!-- 金币掉落容器 -->
    <div id="coin-container"></div>

    <div class="container">
        <h1 class="title">💰 实时工资计算器</h1>
        <p class="subtitle">每一秒都在赚钱的感觉，就是这么爽！</p>

        <!-- 输入区域 -->
        <div class="input-section" id="inputSection">
            <div class="input-grid">
                <div class="input-group">
                    <label>💵 月薪 (元)</label>
                    <input type="number" id="monthlySalary" placeholder="例如: 10000" min="0">
                </div>
                <div class="input-group">
                    <label>🌅 上班时间</label>
                    <input type="time" id="startTime" value="09:00">
                </div>
                <div class="input-group">
                    <label>🌙 下班时间</label>
                    <input type="time" id="endTime" value="18:00">
                </div>
                <div class="input-group">
                    <label>📅 每月工作天数</label>
                    <input type="number" id="workDays" placeholder="例如: 22" value="22" min="1" max="31">
                </div>
            </div>
            <button class="btn-gold" onclick="startCalculation()">🚀 开始赚钱模式</button>
        </div>

        <!-- 显示区域 -->
        <div class="display-section" id="displaySection">
            <div class="money-label">💎 您当前已赚取</div>
            <div class="money-display" id="moneyDisplay">¥0.0000</div>
            
            <div class="work-status resting" id="workStatus">
                ⏰ 等待上班...
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="perSecond">¥0.00</div>
                    <div class="stat-label">每秒收入</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="perMinute">¥0.00</div>
                    <div class="stat-label">每分钟收入</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="perHour">¥0.00</div>
                    <div class="stat-label">每小时收入</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="perDay">¥0.00</div>
                    <div class="stat-label">每日收入</div>
                </div>
            </div>

            <div class="speed-control">
                <div class="speed-label">⚡ 赚钱倍速 (1-10x)</div>
                <input type="range" class="speed-slider" id="speedSlider" min="1" max="10" value="1" oninput="updateSpeed(this.value)">
                <div class="speed-display" id="speedDisplay">1x 正常速度</div>
                <div class="speed-hint" id="speedHint">🪙 金币掉落模式已开启！</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let salaryPerSecond = 0;
        let currentEarnings = 0;
        let startTimeMinutes = 0;
        let endTimeMinutes = 0;
        let isWorking = false;
        let animationId = null;
        let lastUpdateTime = 0;
        let speedMultiplier = 1;
        let coinInterval = null;

        // 初始化背景粒子
        function initParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'bg-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (5 + Math.random() * 5) + 's';
                container.appendChild(particle);
            }
        }

        // 时间转分钟
        function timeToMinutes(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        // 获取当前时间（分钟）
        function getCurrentMinutes() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        // 格式化金额
        function formatMoney(amount) {
            return '¥' + amount.toFixed(4);
        }

        // 创建金币
        function createCoin() {
            const container = document.getElementById('coin-container');
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerHTML = ['💰', '💵', '🪙', '✨', '⭐'][Math.floor(Math.random() * 5)];
            coin.style.left = Math.random() * 100 + '%';
            coin.style.animationDuration = (2 + Math.random() * 2) + 's';
            coin.style.fontSize = (20 + Math.random() * 20) + 'px';
            container.appendChild(coin);
            
            setTimeout(() => coin.remove(), 4000);
        }

        // 开始金币雨
        function startCoinRain() {
            if (coinInterval) clearInterval(coinInterval);
            
            const interval = Math.max(50, 500 - (speedMultiplier * 40));
            coinInterval = setInterval(() => {
                if (isWorking && speedMultiplier > 1) {
                    const count = Math.floor(speedMultiplier / 2) + 1;
                    for (let i = 0; i < count; i++) {
                        setTimeout(() => createCoin(), i * 50);
                    }
                }
            }, interval);
        }

        // 更新倍速
        function updateSpeed(value) {
            speedMultiplier = parseInt(value);
            const display = document.getElementById('speedDisplay');
            const hint = document.getElementById('speedHint');
            
            const labels = {
                1: '1x 正常速度',
                2: '2x 加速模式',
                3: '3x 快速赚钱',
                4: '4x 财源滚滚',
                5: '5x 黄金时刻',
                6: '6x 暴富模式',
                7: '7x 钱如雨下',
                8: '8x 财富自由',
                9: '9x 日进斗金',
                10: '10x 财神附体'
            };
            
            display.textContent = labels[speedMultiplier] || `${speedMultiplier}x`;
            
            if (speedMultiplier > 1) {
                hint.classList.add('show');
                startCoinRain();
            } else {
                hint.classList.remove('show');
                if (coinInterval) clearInterval(coinInterval);
            }
        }

        // 开始计算
        function startCalculation() {
            const monthlySalary = parseFloat(document.getElementById('monthlySalary').value);
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const workDays = parseInt(document.getElementById('workDays').value);

            if (!monthlySalary || monthlySalary <= 0) {
                alert('请输入有效的月薪！');
                return;
            }

            if (!workDays || workDays <= 0) {
                alert('请输入有效的工作天数！');
                return;
            }

            // 计算时间
            startTimeMinutes = timeToMinutes(startTime);
            endTimeMinutes = timeToMinutes(endTime);
            
            if (endTimeMinutes <= startTimeMinutes) {
                alert('下班时间必须晚于上班时间！');
                return;
            }

            // 计算每秒收入
            const dailyHours = (endTimeMinutes - startTimeMinutes) / 60;
            const dailySalary = monthlySalary / workDays;
            const hourlySalary = dailySalary / dailyHours;
            salaryPerSecond = hourlySalary / 3600;

            // 更新统计卡片
            document.getElementById('perSecond').textContent = formatMoney(salaryPerSecond);
            document.getElementById('perMinute').textContent = formatMoney(salaryPerSecond * 60);
            document.getElementById('perHour').textContent = formatMoney(hourlySalary);
            document.getElementById('perDay').textContent = formatMoney(dailySalary);

            // 显示计算区域
            document.getElementById('displaySection').classList.add('active');
            document.getElementById('inputSection').style.display = 'none';

            // 开始动画循环
            lastUpdateTime = performance.now();
            updateEarnings(lastUpdateTime);
        }

        // 更新收入
        function updateEarnings(currentTime) {
            const deltaTime = (currentTime - lastUpdateTime) / 1000;
            lastUpdateTime = currentTime;

            const currentMinutes = getCurrentMinutes();
            const currentSeconds = new Date().getSeconds() + new Date().getMilliseconds() / 1000;
            const totalCurrentMinutes = currentMinutes + currentSeconds / 60;

            // 检查是否在工作时间
            const wasWorking = isWorking;
            isWorking = totalCurrentMinutes >= startTimeMinutes && totalCurrentMinutes < endTimeMinutes;

            // 更新工作状态显示
            const statusEl = document.getElementById('workStatus');
            if (isWorking) {
                statusEl.textContent = '💼 正在赚钱中...';
                statusEl.className = 'work-status working';
                
                // 计算今日已赚
                const workedMinutes = totalCurrentMinutes - startTimeMinutes;
                const workedSeconds = workedMinutes * 60;
                currentEarnings = workedSeconds * salaryPerSecond * speedMultiplier;
            } else {
                statusEl.textContent = '⏰ 非工作时间 - 休息中';
                statusEl.className = 'work-status resting';
                
                if (totalCurrentMinutes >= endTimeMinutes) {
                    // 下班了，显示全天收入
                    const dailyHours = (endTimeMinutes - startTimeMinutes) / 60;
                    const dailySeconds = dailyHours * 3600;
                    currentEarnings = dailySeconds * salaryPerSecond;
                } else {
                    // 还没上班
                    currentEarnings = 0;
                }
            }

            // 更新显示
            document.getElementById('moneyDisplay').textContent = formatMoney(currentEarnings);

            // 继续动画
            animationId = requestAnimationFrame(updateEarnings);
        }

        // 初始化
        initParticles();

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            if (coinInterval) clearInterval(coinInterval);
        });
    </script>
</body>
</html>
